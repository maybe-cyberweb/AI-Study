<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跳转中…</title>
    <meta name="robots" content="noindex" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: #0b1220;
        color: rgba(226, 232, 240, 0.9);
      }
      .wrap {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 520px;
        padding: 22px 18px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        text-align: center;
      }
      .t {
        font-weight: 800;
        margin-bottom: 10px;
      }
      .p {
        font-size: 14px;
        line-height: 1.7;
        color: rgba(226, 232, 240, 0.72);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="t">正在跳转到知识库…</div>
        <div class="p">如果浏览器没有自动跳转，请返回并重新打开链接。</div>
      </div>
    </div>
    <script>
      const p = window.location.pathname || '/'
      const s = window.location.search || ''
      if (p === '/' || p === '/404.html') {
        window.location.replace('/')
      } else {
        window.location.replace('/#' + p + s)
      }
    </script>
  </body>
</html>
